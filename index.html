<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TagStart Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg: #f8fafc;
            --panel: #ffffff;
            --border: #e2e8f0;
            --accent: #7c3aed;
            --text: #0f172a;
            --code-text: #059669;
            --box-bg: #f1f5f9;
            --muted: #64748b;
        }

        body.dark-theme{
            --bg:#09090b;
            --panel: #141416;
            --border: #27272a;
            --accent: #3b82f6;
            --text: #e4e4e7;
            --code-text: #34d399;
            --box-bg: #09090b;
            --muted: #a1a1aa;
        }
        body { 
            margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg); color: var(--text); height: 100vh; overflow: hidden;
            display: grid; grid-template-rows: auto 1fr; padding: 16px; gap: 16px; box-sizing: border-box;
            transition: background-color 0.3s, color 0.3s;
        }
        
        header { display: flex; justify-content: space-between; align-items: center; padding: 0 10px; }
        
        .grid-container {
            display: grid; 
            grid-template-columns: 300px 1fr 1fr; 
            gap: 16px; 
            height: calc(100vh - 80px);
        }

        
        .card {
            position: relative;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
            transition: border-color 0.3s ease, background-color 0.3s;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 16px;
            pointer-events: none;
            background: radial-gradient(circle 200px at var(--x, 50%) var(--y, 50%), rgba(124,58,237, 0.15), transparent 80%);
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 1;
        }
        .card:hover::before { opacity: 1; }

        .card-header { position: relative; z-index: 2; padding: 12px 16px; border-bottom: 1px solid var(--border); font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; display: flex; align-items: center; justify-content: space-between;}
        
        .side { position: relative; z-index: 2; padding: 20px; display: flex; flex-direction: column; justify-content: space-between; }
        
        textarea, iframe { position: relative; z-index: 2; width: 100%; height: 100%; border: none; background: transparent; color: var(--code-text); font-family: "Fira Code", monospace; padding: 20px; box-sizing: border-box; outline: none; resize: none; font-size: 14px; font-weight:600;}
        iframe { background: white; }
        
        button { position: relative; z-index: 2; background: var(--accent); color: white; border: none; padding: 16px; border-radius: 12px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        button:disabled { opacity: 0.4;cursor: not-allowed; }
        
        code { background: var(--box-bg); padding: 2px 4px; border-radius: 4px; color: #e11d48; font-weight: bold; }
        .task-box { position: relative; z-index: 2; background: var(--box-bg); padding: 16px; border-radius: 8px; border: 1px solid var(--border); margin-top: 10px; font-size: 14px; line-height: 1.5; transition: background-color 0.3s;}
    </style>
</head>
<body>

    <header>
        <div style="font-weight: 800; letter-spacing: -1px; font-size: 20px;">TAGSTART <span style="color:var(--accent)">//</span> PRO</div>
        <div style="display: flex; gap:10px; align-items: center;">
            <button onclick="toggleTheme()" id="theme-btn" style="padding:6px 12px; font-size:12px; border-radius:20px;background: var(--panel); color:var(--text); border:1px solid var(--border); box-shadow:none;">🌙 Dark Mode</button>
            <div id="lvl" style="font-size: 12px; color: var(--muted); background: var(--panel); padding: 6px 12px; border-radius: 20px; border: 1px solid var(--border);">Step 1/7</div>
        </div>
    </header>

    <div class="grid-container">
        <div class="card side" id="side-card">
            <div>
                <h3 id="title" style="margin: 0; font-size: 20px;"></h3>
                <p id="desc" style="color: var(--muted); font-size: 14px; margin: 10px 0;"></p>
                <div class="task-box">
                    <div style="color:var(--accent); font-size: 11px; font-weight: bold; margin-bottom: 5px;">MISSION</div>
                    <span id="task"></span>
                </div>
            </div>
            <button id="btn" onclick="next()" disabled>Complete Task First</button>
        </div>

        <div class="card" id="editor-card">
            <div class="card-header">Code Editor</div>
            <textarea id="edit" spellcheck="false" oninput="run()"></textarea>
        </div>

        <div class="card" id="preview-card">
            <div class="card-header">Live Preview</div>
            <iframe id="view"></iframe>
        </div>
    </div>

    <script>
        document.querySelectorAll('.card').forEach(card => {
            card.addEventListener('mousemove', e => {
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                card.style.setProperty('--x', `${x}px`);
                card.style.setProperty('--y', `${y}px`);
            });
        });

        const steps = [
            { t: "Text Hierarchy", d: "Use <code>&lt;h1&gt;</code> and <code>&lt;p&gt;</code>.", k: "Make an h1 title and a paragraph.", c: "<h1>Title</h1>\n<p>Text</p>", v: c => c.includes('<h1>') && c.includes('<p>') },
            { t: "Hyperlinks", d: "Use <code>&lt;a&gt;</code> tags.", k: "Create a link to google.com", c: "", v: c => c.includes('<a') },
            { t: "Images", d: "Use <code>&lt;img&gt;</code> tags.", k: "Add an image with src='https://picsum.photos/100'", c: "", v: c => c.includes('<img') },
            { t: "Lists", d: "Use <code>&lt;ul&gt;</code> and <code>&lt;li&gt;</code>.", k: "Make a list with 2 items.", c: "<ul>\n<li>1</li>\n<li>2</li>\n</ul>", v: c => c.includes('<ul>') && (c.match(/<li>/g) || []).length >= 2 },
            { t: "Containers", d: "Use <code>&lt;div&gt;</code> to group elements.", k: "Wrap two paragraphs in a div.", c: "<div>\n<p>1</p>\n<p>2</p>\n</div>", v: c => c.includes('<div') && (c.match(/<p>/g) || []).length >= 2 },
            { t: "Forms", d: "Use <code>&lt;form&gt;</code>.", k: "Create a form with an input.", c: "<form>\n<input>\n</form>", v: c => c.includes('<form') },
            { t: "Tables", d: "Use <code>&lt;table&gt;</code>.", k: "Make a table with 2 cells.", c: "<table><tr><td>1</td><td>2</td></tr></table>", v: c => c.includes('<table>') }
        ];

        let idx = 0;
        const $ = id => document.getElementById(id);

        function load() {
            if (idx >= steps.length) { document.querySelector('.grid-container').innerHTML = "<h1 style='text-align:center; grid-column:span 3; margin-top:20vh;'>Challenge Complete!</h1>"; return; }
            $("lvl").innerText = `Level ${idx + 1}/${steps.length}`;
            $("title").innerText = steps[idx].t;
            $("desc").innerHTML = steps[idx].d;
            $("task").innerHTML = steps[idx].k;
            $("edit").value = steps[idx].c;
            run();
        }

        function run() {
            const code = $("edit").value;
            const doc = $("view").contentDocument;
            doc.open(); doc.write(`<style>body{font-family:sans-serif;}</style>${code}`); doc.close();
            const pass = steps[idx].v(code.toLowerCase());
            $("btn").disabled = !pass;
        }

        function next() {
            confetti({
                particleCount:150,
                spread:70,
                origin:{y: 0.6}
            }); 
            idx++; 
            load(); 
        }
        function toggleTheme(){
            document.body.classList.toggle('dark-theme');
            const isDark=document.body.classList.contains('dark-theme');
            const btn=document.getElementById('theme-btn');
            btn.innerHTML= isDark ? '🌞 Light Mode' : '🌙 Dark Mode';
        }

        load();
    </script>
</body>
</html>
